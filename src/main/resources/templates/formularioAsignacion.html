<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Formulario de Asignación</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    </head>
    <body>
        <div class="container mt-4">
            <h2>Formulario de Asignación</h2>

            <div th:if="${mensajeError}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <span th:text="${mensajeError}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <form th:action="@{/asignacion/guardar}" th:object="${asignacion}" method="post">
                <input type="hidden" th:field="*{idAsignacion}" />

                <div class="mb-3">
                    <label class="form-label">Estudiante</label>
                    <select class="form-control" th:field="*{estudiante.idEstudiante}" required>
                        <option value="">Seleccione un estudiante</option>
                        <option th:each="estudiante : ${estudiantes}"
                                th:value="${estudiante.idEstudiante}"
                                th:text="${estudiante.nombre} + ' ' + ${estudiante.apellidos}">
                        </option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Materia</label>
                    <select class="form-control" th:field="*{materia.idMateria}" required>
                        <option value="">Seleccione una materia</option>
                        <option th:each="materia : ${materias}"
                                th:value="${materia.idMateria}"
                                th:text="${materia.nombre}">
                        </option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Fecha de Asignación</label>
                    <input type="date"
                           class="form-control"
                           name="fechaAsignacion"
                           th:value="${asignacion.fechaAsignacion != null ? #temporals.format(asignacion.fechaAsignacion, 'yyyy-MM-dd') : ''}"
                           required />
                </div>

                <div class="mb-3">
                    <label class="form-label">Estado</label>
                    <select class="form-control" th:field="*{estado}" required>
                        <option value="">Seleccione un estado</option>
                        <option value="Activo">Activo</option>
                        <option value="Inactivo">Inactivo</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-success">Guardar</button>
                <a th:href="@{/asignacion/listado}" class="btn btn-secondary">Cancelar</a>
            </form>
        </div>
    </body>
</html>
