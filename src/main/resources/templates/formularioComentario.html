<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Comentario</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <style>

        body{
            margin:0;
            font-family: Arial, Helvetica, sans-serif;
            background-color:white;
        }

        /* barra izquierda */
        .barra-lateral{
            position:fixed;
            left:0;
            top:0;
            width:200px;
            height:100%;
            background-color:#5a5a5a;
        }

        /* titulo superior */
        .titulo{
            position:absolute;
            top:20px;
            right:30px;
            font-size:28px;
            font-weight:bold;
            color:#333;
        }

        /* contenido */
        .contenido{
            margin-left:230px;
            margin-top:80px;
        }

        /* menu lateral */
        .menu{
            margin-top:120px;
            display:flex;
            flex-direction:column;
        }

        .menu-item{
            color:white;
            text-decoration:none;
            padding:15px;
            font-weight:bold;
        }

        .menu-item:hover{
            background-color:#777;
        }

    </style>

</head>

<body>

<div class="barra-lateral">
    <div class="menu">
        <a th:href="@{/}" class="menu-item">Inicio</a>
        <a th:href="@{/recurso/listado}" class="menu-item">Recursos</a>
    </div>
</div>

<div class="titulo">
    EduRefuerzo
</div>

<div class="contenido container">

    <h2>Comentario</h2>

    <form th:action="@{/comentario/guardar}" th:object="${comentario}" method="post">

        <!-- ID del comentario (para editar) -->
        <input type="hidden" th:field="*{idComentario}" />

        <!-- ID del recurso -->
        <input type="hidden" name="idRecurso" th:value="${idRecurso}"/>

        <div class="mb-3">
            <label>Contenido:</label>
            <textarea th:field="*{contenido}" class="form-control" required></textarea>
        </div>

        <div class="mb-3">
            <label>Estado:</label>
            <select th:field="*{estado}" class="form-control">
                <option value="Activo">Activo</option>
                <option value="Inactivo">Inactivo</option>
            </select>
        </div>

        <div class="mb-3">
            <label>ID Estudiante:</label>
            <input type="number" th:field="*{estudiante.idEstudiante}" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-success">
            Guardar
        </button>

        <a th:href="@{/comentario/listado/{id}(id=${idRecurso})}" class="btn btn-secondary">
            Cancelar
        </a>

    </form>

</div>

</body>
</html>
