<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<title>Formulario Contacto</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

</head>

<body>

<div class="container mt-4">

<h2>Registro de Contacto</h2>

<form th:action="@{/contacto/guardar}" th:object="${contacto}" method="post">

<input type="hidden" th:field="*{idContacto}" />

<div class="mb-3">
<label>Nombre:</label>
<input type="text" th:field="*{nombre}" class="form-control">
</div>

<div class="mb-3">
<label>Correo:</label>
<input type="email" th:field="*{correo}" class="form-control">
</div>

<div class="mb-3">
<label>Tipo:</label>
<select th:field="*{tipo}" class="form-control">
    <option value="Estudiante">Estudiante</option>
    <option value="Administrador">Administrador</option>
    <option value="Tutor">Tutor</option>
</select>
</div>

<div class="mb-3">
<label>Estado:</label>
<select th:field="*{estado}" class="form-control">
    <option value="Activo">Activo</option>
    <option value="Inactivo">Inactivo</option>
</select>
</div>

<button type="submit" class="btn btn-success">
Guardar
</button>

<a th:href="@{/contacto/listado}" class="btn btn-secondary">
Cancelar
</a>

</form>

</div>

</body>
</html>
