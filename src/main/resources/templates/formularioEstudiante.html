<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<title>Formulario Estudiante</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

</head>

<body>

<div class="container mt-4">

<h2>Registro de Estudiante</h2>

<form th:action="@{/estudiante/guardar}" th:object="${estudiante}" method="post">

<input type="hidden" th:field="*{idEstudiante}" />

<div class="mb-3">
<label>Nombre:</label>
<input type="text" th:field="*{nombre}" class="form-control">
</div>

<div class="mb-3">
<label>Apellidos:</label>
<input type="text" th:field="*{apellidos}" class="form-control">
</div>

<div class="mb-3">
<label>Correo:</label>
<input type="email" th:field="*{correo}" class="form-control">
</div>

<div class="mb-3">
<label>Contraseña:</label>
<input type="password" th:field="*{password}" class="form-control">
</div>

<div class="mb-3">
<label>Carrera:</label>
<input type="text" th:field="*{carrera}" class="form-control">
</div>

<button type="submit" class="btn btn-success">
Guardar
</button>

<a th:href="@{/estudiante/listado}" class="btn btn-secondary">
Cancelar
</a>

</form>

</div>

</body>
</html>
