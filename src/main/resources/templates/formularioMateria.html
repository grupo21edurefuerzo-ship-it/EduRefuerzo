<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Formulario Materia</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Datos de la Materia</h4>
            </div>
            <div class="card-body">
                <form th:action="@{/materia/guardar}" th:object="${materia}" method="POST">
                    <input type="hidden" th:field="*{idMateria}"/>
                    <div class="mb-3">
                        <label class="form-label">Nombre:</label>
                        <input type="text" class="form-control" th:field="*{nombre}" required/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Descripción:</label>
                        <textarea class="form-control" th:field="*{descripcion}" rows="3"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Estado:</label>
                        <select class="form-select" th:field="*{estado}">
                            <option value="Activo">Activo</option>
                            <option value="Inactivo">Inactivo</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-success">Guardar</button>
                    <a th:href="@{/materia/listado}" class="btn btn-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
