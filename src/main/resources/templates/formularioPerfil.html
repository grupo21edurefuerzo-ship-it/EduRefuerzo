<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<title>Formulario Perfil</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

</head>

<body>

<div class="container mt-4">

<h2>Registro de Perfil</h2>

<form th:action="@{/perfil/guardar}" th:object="${perfil}" method="post">

<input type="hidden" th:field="*{idPerfil}" />

<div class="mb-3">
<label>Nombre completo:</label>
<input type="text" th:field="*{nombreCompleto}" class="form-control">
</div>

<div class="mb-3">
<label>Correo:</label>
<input type="email" th:field="*{correo}" class="form-control">
</div>

<div class="mb-3">
<label>Carrera:</label>
<input type="text" th:field="*{carrera}" class="form-control">
</div>

<div class="mb-3">
<label>Descripción:</label>
<textarea th:field="*{descripcion}" class="form-control"></textarea>
</div>

<button type="submit" class="btn btn-success">
Guardar
</button>

<a th:href="@{/perfil/listado}" class="btn btn-secondary">
Cancelar
</a>

</form>

</div>

</body>
</html>
