<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Formulario Publicación</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <style>

        body{
            margin:0;
            font-family: Arial, Helvetica, sans-serif;
            background-color:white;
        }

        .barra-lateral{
            position:fixed;
            left:0;
            top:0;
            width:200px;
            height:100%;
            background-color:#5a5a5a;
        }

        .titulo{
            position:absolute;
            top:20px;
            right:30px;
            font-size:28px;
            font-weight:bold;
            color:#333;
        }

        .contenido{
            margin-left:230px;
            margin-top:80px;
        }

        .menu{
            margin-top:120px;
            display:flex;
            flex-direction:column;
        }

        .menu-item{
            color:white;
            text-decoration:none;
            padding:15px;
            font-weight:bold;
        }

        .menu-item:hover{
            background-color:#777;
        }

    </style>

</head>

<body>

<div class="barra-lateral">
    <div class="menu">
        <a th:href="@{/}" class="menu-item">Inicio</a>
        <a th:href="@{/publicacion/listado}" class="menu-item">Volver</a>
    </div>
</div>

<div class="titulo">
    EduRefuerzo
</div>

<div class="contenido container">

    <h2>Publicación</h2>

    <form th:action="@{/publicacion/guardar}" th:object="${publicacion}" method="post">

        <input type="hidden" th:field="*{idPublicacion}" />

        <div class="mb-3">
            <label>Título:</label>
            <input type="text" th:field="*{titulo}" class="form-control">
        </div>

        <div class="mb-3">
            <label>Resumen:</label>
            <input type="text" th:field="*{resumen}" class="form-control">
        </div>

        <div class="mb-3">
            <label>Contenido:</label>
            <textarea th:field="*{contenido}" class="form-control" rows="5"></textarea>
        </div>

        <div class="mb-3">
            <label>Imagen (URL o nombre):</label>
            <input type="text" th:field="*{imagen}" class="form-control">
        </div>

        <div class="mb-3">
            <label>Estado:</label>
            <select th:field="*{estado}" class="form-control">
                <option value="Publicado">Publicado</option>
                <option value="Borrador">Borrador</option>
            </select>
        </div>

        <button type="submit" class="btn btn-success">
            Guardar
        </button>

        <a th:href="@{/publicacion/listado}" class="btn btn-secondary">
            Cancelar
        </a>

    </form>

</div>

</body>
</html>
