<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Formulario de Recurso</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    </head>
    <body>
        <div class="container mt-4">
            <h2>Formulario de Recurso</h2>

            <form th:action="@{/recurso/guardar}" th:object="${recurso}" method="post">
                <input type="hidden" th:field="*{idRecurso}">

                <div class="mb-3">
                    <label class="form-label">Título</label>
                    <input type="text" class="form-control" th:field="*{titulo}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Descripción</label>
                    <input type="text" class="form-control" th:field="*{descripcion}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Tipo</label>
                    <input type="text" class="form-control" th:field="*{tipo}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Archivo</label>
                    <input type="text" class="form-control" th:field="*{archivo}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Estado</label>
                    <select class="form-control" th:field="*{estado}" required>
                        <option value="">Seleccione un estado</option>
                        <option value="Activo">Activo</option>
                        <option value="Inactivo">Inactivo</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Tema</label>
                    <select class="form-control" th:field="*{tema.idTema}" required>
                        <option value="">Seleccione un tema</option>
                        <option th:each="tema : ${temas}"
                                th:value="${tema.idTema}"
                                th:text="${tema.nombre}">
                        </option>
                    </select>
                </div>

                <button type="submit" class="btn btn-success">Guardar</button>
                <a th:href="@{/recurso/listado}" class="btn btn-secondary">Cancelar</a>
            </form>
        </div>
    </body>
</html>
