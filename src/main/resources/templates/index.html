<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<title>EduRefuerzo</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background-color:white;
}

/* barra izquierda */
.barra-lateral{
    position:fixed;
    left:0;
    top:0;
    width:200px;
    height:100%;
    background-color:#5a5a5a;
}

/* titulo superior */
.titulo{
    position:absolute;
    top:20px;
    right:30px;
    font-size:28px;
    font-weight:bold;
    color:#333;
}

/* contenido */
.contenido{
    margin-left:230px;
    margin-top:80px;
}

/* menu lateral */
.menu{
    margin-top:120px;
    display:flex;
    flex-direction:column;
}

.menu-item{
    color:white;
    text-decoration:none;
    padding:15px;
    font-weight:bold;
}

.menu-item:hover{
    background-color:#777;
}

</style>

</head>

<body>

<div class="barra-lateral">

    <div class="menu">
        <a th:href="@{/}" class="menu-item">Inicio</a>
        <a th:href="@{/administrador/listado}" class="menu-item">Administradores</a>
    </div>

</div>

<div class="titulo">
    EduRefuerzo
</div>

<div class="contenido">

<h2>Bienvenido al sistema EduRefuerzo</h2>

<p>
Sistema para la gestión de  contenido académico.
</p>

<a th:href="@{/administrador/listado}" class="btn btn-primary">
Ir a Administradores
</a>

</div>

</body>
</html>
