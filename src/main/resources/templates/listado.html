<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

    <head>
        <title>Administradores</title>

        <link rel="stylesheet"
              href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

        <style>

            body{
                margin:0;
                font-family: Arial, Helvetica, sans-serif;
                background-color:white;
            }

            /* franja izquierda */
            .barra-lateral{
                position:fixed;
                left:0;
                top:0;
                width:200px;
                height:100%;
                background-color:#5a5a5a;
            }

            /* titulo superior */
            .titulo{
                position:absolute;
                top:20px;
                right:30px;
                font-size:28px;
                font-weight:bold;
                color:#333;
            }

            /* contenido */
            .contenido{
                margin-left:230px;
                margin-top:80px;
            }

            /* menu lateral */
            .menu{
                margin-top:120px;
                display:flex;
                flex-direction:column;
            }

            .menu-item{
                color:white;
                text-decoration:none;
                padding:15px;
                font-weight:bold;
            }

            .menu-item:hover{
                background-color:#777;
            }

        </style>

    </head>

    <body>

        <div class="barra-lateral">

            <div class="menu">
                <a th:href="@{/}" class="menu-item">Inicio</a>

            </div>
        </div>

        <div class="titulo">
            EduRefuerzo
        </div>

        <div class="contenido container">

            <h2>Lista de Administradores</h2>

            <a th:href="@{/administrador/nuevo}" class="btn btn-primary">
                Nuevo Administrador
            </a>

            <table class="table table-striped mt-3">

                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Apellidos</th>
                        <th>Correo</th>
                        <th>Acciones</th>
                    </tr>
                </thead>

                <tbody>

                    <tr th:each="a : ${administradores}">
                        <td th:text="${a.idAdministrador}"></td>
                        <td th:text="${a.nombre}"></td>
                        <td th:text="${a.apellidos}"></td>
                        <td th:text="${a.correo}"></td>

                        <td>

                            <a th:href="@{/administrador/modificar/{id}(id=${a.idAdministrador})}"
                               class="btn btn-warning btn-sm">
                                Editar
                            </a>

                            <a th:href="@{/administrador/eliminar/{id}(id=${a.idAdministrador})}"
                               class="btn btn-danger btn-sm">
                                Eliminar
                            </a>

                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

    </body>
</html>
