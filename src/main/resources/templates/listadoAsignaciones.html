<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Listado de Asignaciones</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-4">
        <h2>Asignaciones de Materias</h2>

        <div th:if="${mensajeExito}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${mensajeExito}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <a th:href="@{/asignacion/nuevo}" class="btn btn-primary mb-3">Nueva Asignación</a>

        <table class="table table-striped mt-3">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Estudiante</th>
                    <th>Materia</th>
                    <th>Fecha Asignación</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="asignacion : ${asignaciones}">
                    <td th:text="${asignacion.idAsignacion}"></td>
                    <td th:text="${asignacion.estudiante.nombre + ' ' + asignacion.estudiante.apellidos}"></td>
                    <td th:text="${asignacion.materia.nombre}"></td>
                    <td th:text="${asignacion.fechaAsignacion}"></td>
                    <td th:text="${asignacion.estado}"></td>
                    <td>
                        <a th:href="@{/asignacion/modificar/{id}(id=${asignacion.idAsignacion})}" class="btn btn-warning btn-sm">Editar</a>

                        <button type="button"
                                class="btn btn-danger btn-sm"
                                data-bs-toggle="modal"
                                data-bs-target="#confirmModal"
                                th:attr="data-bs-id=${asignacion.idAsignacion},data-bs-estudiante=${asignacion.estudiante.nombre + ' ' + asignacion.estudiante.apellidos},data-bs-materia=${asignacion.materia.nombre}">
                            Eliminar
                        </button>
                    </td>
                </tr>
            </tbody>
        </table>

        <a href="/" class="btn btn-secondary">Volver al inicio</a>
    </div>

    <div class="modal fade" id="confirmModal" tabindex="-1" aria-labelledby="confirmModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Confirmar eliminación</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    ¿Está seguro de que desea eliminar la asignación de
                    <strong id="asignacionEstudiante"></strong>
                    en la materia
                    <strong id="asignacionMateria"></strong>?
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <a id="confirmDeleteBtn" href="#" class="btn btn-danger">Eliminar</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const confirmModal = document.getElementById('confirmModal');
        confirmModal.addEventListener('show.bs.modal', function (event) {
            const button = event.relatedTarget;
            const id = button.getAttribute('data-bs-id');
            const estudiante = button.getAttribute('data-bs-estudiante');
            const materia = button.getAttribute('data-bs-materia');

            document.getElementById('asignacionEstudiante').textContent = estudiante;
            document.getElementById('asignacionMateria').textContent = materia;
            document.getElementById('confirmDeleteBtn').href = '/asignacion/eliminar/' + id;
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
