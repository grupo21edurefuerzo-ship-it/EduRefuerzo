<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Comentarios</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <style>

        body{
            margin:0;
            font-family: Arial, Helvetica, sans-serif;
            background-color:white;
        }

        /* barra izquierda */
        .barra-lateral{
            position:fixed;
            left:0;
            top:0;
            width:200px;
            height:100%;
            background-color:#5a5a5a;
        }

        /* titulo */
        .titulo{
            position:absolute;
            top:20px;
            right:30px;
            font-size:28px;
            font-weight:bold;
            color:#333;
        }

        /* contenido */
        .contenido{
            margin-left:230px;
            margin-top:80px;
        }

        /* menu */
        .menu{
            margin-top:120px;
            display:flex;
            flex-direction:column;
        }

        .menu-item{
            color:white;
            text-decoration:none;
            padding:15px;
            font-weight:bold;
        }

        .menu-item:hover{
            background-color:#777;
        }

    </style>
</head>

<body>

<div class="barra-lateral">
    <div class="menu">
        <a th:href="@{/}" class="menu-item">Inicio</a>
        <a th:href="@{/recurso/listado}" class="menu-item">Volver a Recursos</a>
    </div>
</div>

<div class="titulo">
    EduRefuerzo
</div>

<div class="contenido container">

    <h2>Comentarios</h2>

    <a th:href="@{/comentario/nuevo/{id}(id=${idRecurso})}" 
       class="btn btn-primary">
       Nuevo Comentario
    </a>

    <table class="table table-striped mt-3">

        <thead>
            <tr>
                <th>ID</th>
                <th>Contenido</th>
                <th>Fecha</th>
                <th>Estado</th>
                <th>Estudiante</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody>

            <tr th:each="c : ${comentarios}">
                <td th:text="${c.idComentario}"></td>
                <td th:text="${c.contenido}"></td>
                <td th:text="${c.fecha}"></td>
                <td th:text="${c.estado}"></td>

                <!-- Mostrar estudiante -->
                <td th:text="${c.estudiante.nombre}"></td>

                <td>

                    <a th:href="@{/comentario/modificar/{idC}/{idR}(idC=${c.idComentario}, idR=${idRecurso})}" 
                       class="btn btn-warning btn-sm">
                        Editar
                    </a>

                    <a th:href="@{/comentario/eliminar/{idC}/{idR}(idC=${c.idComentario}, idR=${idRecurso})}" 
                       class="btn btn-danger btn-sm">
                        Eliminar
                    </a>

                </td>
            </tr>

        </tbody>

    </table>

</div>

</body>
</html>
