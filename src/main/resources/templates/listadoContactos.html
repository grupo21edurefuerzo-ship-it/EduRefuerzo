<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<title>Listado de Contactos</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

</head>

<body>

<div class="container mt-4">

<h2>Contactos</h2>

<a th:href="@{/contacto/nuevo}" class="btn btn-primary">
Nuevo Contacto
</a>

<table class="table table-striped mt-3">

<thead>
<tr>
<th>ID</th>
<th>Nombre</th>
<th>Correo</th>
<th>Tipo</th>
<th>Estado</th>
<th>Acciones</th>
</tr>
</thead>

<tbody>

<tr th:each="contacto : ${contactos}">

<td th:text="${contacto.idContacto}"></td>
<td th:text="${contacto.nombre}"></td>
<td th:text="${contacto.correo}"></td>
<td th:text="${contacto.tipo}"></td>
<td th:text="${contacto.estado}"></td>

<td>

<a th:href="@{/contacto/modificar/{id}(id=${contacto.idContacto})}"
class="btn btn-warning btn-sm">
Editar
</a>

<a th:href="@{/contacto/eliminar/{id}(id=${contacto.idContacto})}"
class="btn btn-danger btn-sm">
Eliminar
</a>

</td>

</tr>

</tbody>

</table>

<a href="/" class="btn btn-secondary">
Volver al inicio
</a>

</div>

</body>
</html>
