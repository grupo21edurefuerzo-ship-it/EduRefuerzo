<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<title>Listado de Estudiantes</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

</head>

<body>

<div class="container mt-4">

<h2>Estudiantes</h2>

<a th:href="@{/estudiante/nuevo}" class="btn btn-primary">
Nuevo Estudiante
</a>

<table class="table table-striped mt-3">

<thead>
<tr>
<th>ID</th>
<th>Nombre</th>
<th>Apellidos</th>
<th>Correo</th>
<th>Carrera</th>
<th>Acciones</th>
</tr>
</thead>

<tbody>

<tr th:each="estudiante : ${estudiantes}">

<td th:text="${estudiante.idEstudiante}"></td>
<td th:text="${estudiante.nombre}"></td>
<td th:text="${estudiante.apellidos}"></td>
<td th:text="${estudiante.correo}"></td>
<td th:text="${estudiante.carrera}"></td>

<td>

<a th:href="@{/estudiante/modificar/{id}(id=${estudiante.idEstudiante})}"
class="btn btn-warning btn-sm">
Editar
</a>

<a th:href="@{/estudiante/eliminar/{id}(id=${estudiante.idEstudiante})}"
class="btn btn-danger btn-sm">
Eliminar
</a>

</td>

</tr>

</tbody>

</table>

<a href="/" class="btn btn-secondary">
Volver al inicio
</a>

</div>

</body>
</html>
