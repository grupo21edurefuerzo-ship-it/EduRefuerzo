<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<title>Favoritos</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

</head>

<body>

<div class="container mt-4">

<h2>Favoritos</h2>

<table class="table table-striped mt-3">

<thead>
<tr>
<th>ID</th>
<th>Recurso</th>
<th>Fecha</th>
<th>Estado</th>
<th>Acciones</th>
</tr>
</thead>

<tbody>

<tr th:each="f : ${favoritos}">
<td th:text="${f.idFavorito}"></td>
<td th:text="${f.recurso.titulo}"></td>
<td th:text="${f.fecha}"></td>
<td th:text="${f.estado}"></td>

<td>
<a th:href="@{/favorito/eliminar/{id}(id=${f.idFavorito})}"
class="btn btn-danger btn-sm">
Eliminar
</a>
</td>

</tr>

</tbody>

</table>

<a href="/" class="btn btn-secondary">
Volver al inicio
</a>

</div>

</body>
</html>
