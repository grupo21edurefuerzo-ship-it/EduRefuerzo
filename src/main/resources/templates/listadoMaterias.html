<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Listado de Materias</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-4">
        <h2>Materias</h2>
        <a th:href="@{/materia/nuevo}" class="btn btn-primary mb-3">Nueva Materia</a>
        <table class="table table-striped mt-3">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="materia : ${materias}">
                    <td th:text="${materia.idMateria}"></td>
                    <td th:text="${materia.nombre}"></td>
                    <td th:text="${materia.estado}"></td>
                    <td>
                        <a th:href="@{/materia/modificar/{id}(id=${materia.idMateria})}" class="btn btn-warning btn-sm">Editar</a>
                        <a th:href="@{/materia/eliminar/{id}(id=${materia.idMateria})}" class="btn btn-danger btn-sm">Eliminar</a>
                    </td>
                </tr>
            </tbody>
        </table>
        <a href="/" class="btn btn-secondary">Volver al inicio</a>
    </div>
</body>
</html>
