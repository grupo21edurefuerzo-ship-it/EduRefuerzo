<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Publicaciones</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <style>

        body{
            margin:0;
            font-family: Arial, Helvetica, sans-serif;
            background-color:white;
        }

        .barra-lateral{
            position:fixed;
            left:0;
            top:0;
            width:200px;
            height:100%;
            background-color:#5a5a5a;
        }

        .titulo{
            position:absolute;
            top:20px;
            right:30px;
            font-size:28px;
            font-weight:bold;
            color:#333;
        }

        .contenido{
            margin-left:230px;
            margin-top:80px;
        }

        .menu{
            margin-top:120px;
            display:flex;
            flex-direction:column;
        }

        .menu-item{
            color:white;
            text-decoration:none;
            padding:15px;
            font-weight:bold;
        }

        .menu-item:hover{
            background-color:#777;
        }

    </style>

</head>

<body>

<div class="barra-lateral">
    <div class="menu">
        <a th:href="@{/}" class="menu-item">Inicio</a>
    </div>
</div>

<div class="titulo">
    EduRefuerzo
</div>

<div class="contenido container">

    <h2>Lista de Publicaciones</h2>

    <a th:href="@{/publicacion/nuevo}" class="btn btn-primary">
        Nueva Publicación
    </a>

    <table class="table table-striped mt-3">

        <thead>
        <tr>
            <th>ID</th>
            <th>Título</th>
            <th>Resumen</th>
            <th>Fecha</th>
            <th>Estado</th>
            <th>Acciones</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="p : ${publicaciones}">
            <td th:text="${p.idPublicacion}"></td>
            <td th:text="${p.titulo}"></td>
            <td th:text="${p.resumen}"></td>
            <td th:text="${p.fechaPublicacion}"></td>
            <td th:text="${p.estado}"></td>

            <td>
                <a th:href="@{/publicacion/modificar/{id}(id=${p.idPublicacion})}"
                   class="btn btn-warning btn-sm">
                    Editar
                </a>

                <a th:href="@{/publicacion/eliminar/{id}(id=${p.idPublicacion})}"
                   class="btn btn-danger btn-sm">
                    Eliminar
                </a>
            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
