<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Listado de Recursos</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    </head>
    <body>
        <div class="container mt-4">
            <h2>Recursos</h2>
            
            <div th:if="${mensajeExito}" class="alert alert-success alert-dismissible fade show" role="alert">
                <span th:text="${mensajeExito}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            
            <a th:href="@{/recurso/nuevo}" class="btn btn-primary mb-3">Nuevo Recurso</a>
            <table class="table table-striped mt-3">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Título</th>
                        <th>Tipo</th>
                        <th>Archivo</th>
                        <th>Estado</th>
                        <th>Tema</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="recurso : ${recursos}">
                        <td th:text="${recurso.idRecurso}"></td>
                        <td th:text="${recurso.titulo}"></td>
                        <td th:text="${recurso.tipo}"></td>
                        <td th:text="${recurso.archivo}"></td>
                        <td th:text="${recurso.estado}"></td>
                        <td th:text="${recurso.tema.nombre}"></td>
                        <td>
                            <a th:href="@{/recurso/modificar/{id}(id=${recurso.idRecurso})}" class="btn btn-warning btn-sm">Editar</a>
                            <button type="button" class="btn btn-danger btn-sm"
                                    data-bs-toggle="modal" data-bs-target="#confirmModal"
                                    th:attr="data-bs-id=${recurso.idRecurso},data-bs-titulo=${recurso.titulo}">
                                Eliminar
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
            <a href="/" class="btn btn-secondary">Volver al inicio</a>
        </div>

        <div class="modal fade" id="confirmModal" tabindex="-1" aria-labelledby="confirmModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Confirmar eliminación</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        ¿Está seguro de que desea eliminar el recurso <strong id="recursoTitulo"></strong>?
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <a id="confirmDeleteBtn" href="#" class="btn btn-danger">Eliminar</a>
                    </div>
                </div>
            </div>
        </div>

        <script>
            const confirmModal = document.getElementById('confirmModal');
            confirmModal.addEventListener('show.bs.modal', function (event) {
                const button = event.relatedTarget;
                const id = button.getAttribute('data-bs-id');
                const titulo = button.getAttribute('data-bs-titulo');

                document.getElementById('recursoTitulo').textContent = titulo;
                document.getElementById('confirmDeleteBtn').href = '/recurso/eliminar/' + id;
            });
        </script>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    </body>
</html>
