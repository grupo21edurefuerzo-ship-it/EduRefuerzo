<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Listado de Temas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-4">
        <h2>Temas</h2>
        <a th:href="@{/tema/nuevo}" class="btn btn-primary mb-3">Nuevo Tema</a>
        <table class="table table-striped mt-3">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="tema : ${temas}">
                    <td th:text="${tema.idTema}"></td>
                    <td th:text="${tema.nombre}"></td>
                    <td>
                        <a th:href="@{/tema/modificar/{id}(id=${tema.idTema})}" class="btn btn-warning btn-sm">Editar</a>
                        <a th:href="@{/tema/eliminar/{id}(id=${tema.idTema})}" class="btn btn-danger btn-sm">Eliminar</a>
                    </td>
                </tr>
            </tbody>
        </table>
        <a href="/" class="btn btn-secondary">Volver al inicio</a>
    </div>
</body>
</html>
